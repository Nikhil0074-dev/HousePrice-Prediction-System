<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – HomePrice</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0f2233 0%, #1a3c5e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
    }

    .login-top {
      background: linear-gradient(135deg, #e8871a, #d4761a);
      padding: 2rem;
      text-align: center;
      color: #fff;
    }

    .login-top h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      margin: 0;
    }

    .login-body {
      padding: 2rem;
    }

    .form-label {
      font-weight: 600;
      font-size: .88rem;
      color: #1a3c5e;
    }

    .form-control {
      border: 1.5px solid #dde3ed;
      border-radius: 10px;
      padding: .65rem .9rem;
    }

    .form-control:focus {
      border-color: #e8871a;
      box-shadow: 0 0 0 3px rgba(232, 135, 26, .15);
    }

    .btn-login {
      background: #1a3c5e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: .8rem;
      font-weight: 700;
      width: 100%;
      font-size: 1rem;
      transition: .2s;
    }

    .btn-login:hover {
      background: #122d48;
    }

    .alert {
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="login-top">
      <i class="fas fa-shield-alt fa-2x mb-2"></i>
      <h3>Admin Login</h3>
      <p class="mb-0" style="opacity:.85; font-size:.9rem">HomePrice Control Panel</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2"><small>{{ msg }}</small></div>
      {% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Admin Email</label>
          <input type="email" name="email" class="form-control" placeholder="Admin email" required />
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Admin password" required />
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i>Login to Admin</button>
      </form>
      <div class="mt-3 p-2 rounded" style="background:#f8fafc; font-size:.78rem; color:#64748b;">

      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
